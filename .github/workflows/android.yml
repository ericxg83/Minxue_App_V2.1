name: Android Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        
      - name: Grant execute permission for gradlew
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          # 如果 gradlew 不存在，创建一个简单的 wrapper
          if [ ! -f "gradlew" ]; then
            echo "#!/bin/bash" > gradlew
            echo 'exec gradle "$@"' >> gradlew
            chmod +x gradlew
          fi

      - name: Build Debug APK with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: assembleDebug
          build-root-directory: android

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
          
      - name: Display APK info
        run: |
          echo "📱 APK Build Summary"
          echo "====================="
          find android/app/build/outputs/apk/debug -name "*.apk" -type f | while read apk; do
            ls -lh "$apk"
          done
          echo ""
          echo "✅ APK file is ready for download!"
